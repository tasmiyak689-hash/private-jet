<!DOCTYPE html>
<html>
<head>
    <title>Private Jet Booking</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#07111f;
            color:white;
        }

        nav{
            display:flex;
            justify-content:space-between;
            padding:20px 50px;
            background:black;
        }

        nav h1{
            color:gold;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
        }

        .hero{
            height:90vh;
            background:url('/static/img/jet.jpg');
            background-size:cover;
            background-position:center;
            display:flex;
            flex-direction:column;
            justify-content:center;
            padding-left:80px;
        }

        .hero h2{
            font-size:60px;
            width:500px;
        }

        .hero p{
            font-size:20px;
        }

        .btn{
            width:200px;
            padding:15px;
            background:gold;
            border:none;
            font-size:18px;
            cursor:pointer;
            border-radius:5px;
        }

        .fleet{
            padding:50px;
        }

        .cards{
            display:flex;
            gap:20px;
        }

        .card{
            background:#10233d;
            width:300px;
            border-radius:10px;
            overflow:hidden;
        }

        .card img{
            width:100%;
            height:200px;
        }

        .card h3{
            padding:10px;
        }

        .card p{
            padding:0 10px 10px;
        }

    </style>
</head>

<body>

<nav>
    <h1>JET LUXE</h1>

    <div>
        <a href="/">Home</a>
        <a href="/fleet">Fleet</a>
        <a href="/about">About</a>
        <a href="/login">Login</a>
    </div>
</nav>

<div class="hero">

    <h2>Fly Beyond The Ordinary</h2>

    <p>Luxury private jet booking services</p>

    <button class="btn">Book Now</button>

</div>

<div class="fleet">

    <h1>Luxury Jets</h1>

    <div class="cards">

        <div class="card">
            <img src="/static/img/jet1.jpg">
            <h3>Gulfstream G650</h3>
            <p>Luxury business private jet</p>
        </div>

        <div class="card">
            <img src="/static/img/jet2.jpg">
            <h3>Bombardier Global 7500</h3>
            <p>Long range luxury aircraft</p>
        </div>

        <div class="card">
            <img src="/static/img/jet3.jpg">
            <h3>Falcon 7X</h3>
            <p>Premium comfort and speed</p>
        </div>

    </div>

</div>

</body>
</html>
